name: Relatorio Diario Meta Intelligence

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  relatorio:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Rodar relatorio
        run: node relatorio.js
        env:
          META_TOKEN: ${{ secrets.META_TOKEN }}
          CLAUDE_KEY: ${{ secrets.CLAUDE_KEY }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT }}
